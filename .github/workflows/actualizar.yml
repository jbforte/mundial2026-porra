name: Actualizar resultados Mundial 2026

on:
  # Cambios de código en la web → republicar siempre (no dependen de datos nuevos)
  push:
    branches: [main]
    paths:
      - 'compartir/**'
      - '.github/workflows/**'
  schedule:
    # Sondeo de respaldo cada 30 min (el disparo fiable lo hace cron-job.org cada
    # 15 min vía workflow_dispatch). Solo publica si hay un resultado nuevo.
    - cron: '*/30 * * * *'
  workflow_dispatch: {}   # disparo de cron-job.org y manual

permissions:
  contents: write   # commit del HTML actualizado
  pages: write      # publicar en GitHub Pages
  id-token: write   # autenticación del deploy de Pages

concurrency:
  group: actualizar-mundial
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Actualizar index.html con resultados reales
        run: python actualizar_resultados.py --api-key "${{ secrets.FOOTBALL_API_KEY }}"

      - name: Detectar cambios y persistir
        id: chk
        run: |
          if [[ -n "$(git status --porcelain compartir/index.html)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add compartir/index.html
            git commit -m "Actualizar resultados [skip ci]"
            git push
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Sin resultados nuevos — no se republica."
          fi

      # ---- Publicar en Pages solo si hubo cambios ----
      - name: Configurar Pages
        if: steps.chk.outputs.changed == 'true' || github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Subir artefacto (carpeta compartir)
        if: steps.chk.outputs.changed == 'true' || github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: compartir

      - name: Desplegar a GitHub Pages
        if: steps.chk.outputs.changed == 'true' || github.event_name == 'push'
        id: deployment
        uses: actions/deploy-pages@v4
