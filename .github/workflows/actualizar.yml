name: Actualizar resultados Mundial 2026

on:
  schedule:
    # Sondeo cada 30 min. Más robusto que crons puntuales: si GitHub salta una
    # ejecución, la siguiente recoge el resultado. Repo público => Actions gratis
    # e ilimitado. Solo publica en Pages si hay un resultado nuevo (git diff).
    - cron: '*/30 * * * *'
  workflow_dispatch: {}   # ejecución manual desde la pestaña Actions

permissions:
  contents: write   # commit del HTML actualizado
  pages: write      # publicar en GitHub Pages
  id-token: write   # autenticación del deploy de Pages

concurrency:
  group: actualizar-mundial
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Actualizar index.html con resultados reales
        run: python actualizar_resultados.py --api-key "${{ secrets.FOOTBALL_API_KEY }}"

      - name: Detectar cambios y persistir
        id: chk
        run: |
          if [[ -n "$(git status --porcelain compartir/index.html)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add compartir/index.html
            git commit -m "Actualizar resultados [skip ci]"
            git push
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Sin resultados nuevos — no se republica."
          fi

      # ---- Publicar en Pages solo si hubo cambios ----
      - name: Configurar Pages
        if: steps.chk.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Subir artefacto (carpeta compartir)
        if: steps.chk.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: compartir

      - name: Desplegar a GitHub Pages
        if: steps.chk.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
