  workflow_dispatch: {}   # permite ejecutar manualmente desde la pestaña Actions

permissions:
  contents: write   # commit del HTML actualizado
  pages: write      # publicar en GitHub Pages
  id-token: write   # autenticación del deploy de Pages

concurrency:
  group: actualizar-mundial
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Actualizar index.html con resultados reales
        run: python actualizar_resultados.py --api-key "${{ secrets.FOOTBALL_API_KEY }}"

      - name: Persistir cambios en el repo (si los hay)
        run: |
          if [[ -n "$(git status --porcelain compartir/index.html)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add compartir/index.html
            git commit -m "Actualizar resultados [skip ci]"
            git push
          else
            echo "Sin cambios en los datos."
          fi

      # ---- Publicar en GitHub Pages (gratis e ilimitado) ----
      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto (carpeta compartir)
        uses: actions/upload-pages-artifact@v3
        with:
          path: compartir

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
